---
- name: install utilities and dependencies
  apt:
    name:
      - bash-completion
      - tmux
      - telnet
      - dnsutils
      - tcpdump
      - wget
      - lsof
      - rsync
      - net-tools
    state: present
    update_cache: yes

- name: perform update
  apt:
    upgrade: dist
    update_cache: yes

- name: disable systemd-timesyncd
  block:
    - service: 
        name: systemd-timesyncd
        state: stopped
        enabled: no

    - command: systemctl mask systemd-timesyncd

- name: install chrony
  apt:
    name: chrony
    state: present
    update_cache: yes


- name: download zimbra installer
  get_url:
    url: https://files.zimbra.com/downloads/10.1.0_GA/zcs-NETWORK-10.1.0_GA_4655.UBUNTU22_64.20240819064312.tgz
    dest: /root

- name: extract zimbra installer
  unarchive:
    src: /root/zcs-NETWORK-10.1.0_GA_4655.UBUNTU22_64.20240819064312.tgz
    dest: /root
    remote_src: yes

- name: configure answer file
  template:
    src: zimbra_answers.j2
    dest: /tmp/zimbra_answers.txt

- name: zmsetup config file
  template:
    src: zimbra_config.j2
    dest: /tmp/zimbra_config.txt


- name: run zimbra installer phase 1
  shell: ./install.sh -s --skip-activation-check < /tmp/zimbra_answers.txt
  args:
    chdir: /root/zcs-NETWORK-10.1.0_GA_4655.UBUNTU22_64.20240819064312

- name: run zimbra installer phase 2
  command: /opt/zimbra/libexec/zmsetup.pl -c /tmp/zimbra_config.txt
    
- name: restart zimbra services
  shell: ./zmcontrol restart
  args:
    chdir: /opt/zimbra/bin
  become: yes
  become_user: zimbra
  become_flags: -i
  ignore_errors: yes
